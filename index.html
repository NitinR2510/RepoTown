<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Repo Town</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{background:#d9ecf6}
#wrap{position:relative;width:100vw;height:100vh;overflow:hidden;cursor:default}
#c{display:block;width:100%;height:100%}
#overlay{position:absolute;inset:0;pointer-events:none}

/* Welcome */
#welcome{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(140deg,#d7ecf6 0%,#edf6fb 52%,#fff5e7 100%);pointer-events:all;z-index:100}
#welcome.hidden{display:none}
#welcomeBox{width:min(420px,calc(100vw - 40px));background:#fdf6ec;border:3px solid #c8a46a;border-radius:22px;padding:38px 34px;text-align:center;box-shadow:0 16px 42px rgba(68,42,18,.14)}
#welcomeBox h1{font:32px Georgia,serif;color:#5c3a1e;margin-bottom:10px}
#welcomeBox p{font:14px Georgia,serif;color:#8a6a4a;margin-bottom:22px}
.welcomeForm{display:flex;flex-direction:column;gap:12px}
.welcomeForm input{background:none;border:1.5px solid #c8a46a;border-radius:12px;padding:11px 16px;font:12px Georgia,serif;color:#5c3a1e;outline:none}
.welcomeForm input::placeholder{color:#b8946a}
.welcomeForm button{border:none;border-radius:12px;padding:11px 16px;font:600 12px Georgia,serif;color:#fdf6ec;background:#d4784a;cursor:pointer;transition:transform .2s,background .2s}
.welcomeForm button:hover{background:#c86a3a;transform:translateY(-1px)}
#githubLogin{display:none;background:#35586f}
#githubLogin:hover{background:#29495f}
#githubLogin.show{display:block}
#authhint{font:11px/1.5 Georgia,serif;color:#8a6a4a}

/* UI chrome */
#userbadge{position:absolute;top:16px;left:16px;display:none;align-items:center;gap:8px;padding:8px 14px;border:1.5px solid #c8a46a;border-radius:999px;background:rgba(253,246,236,.94);font:12px Georgia,serif;color:#5c3a1e;pointer-events:all;z-index:10}
#userbadge.show{display:flex}
.avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1.5px solid rgba(92,58,30,.18);background:#fff3e1;flex:0 0 auto}
#radioDock{position:absolute;top:84px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;pointer-events:all;z-index:10}
#radioBtn{padding:8px 12px;border:1.5px solid #c8a46a;border-radius:999px;background:#fdf6ec;color:#5c3a1e;font:11px Georgia,serif;cursor:pointer;transition:background .2s;min-width:98px}
#radioBtn:hover{background:#ecd9a4}
#radioIcon{width:44px;height:44px;display:flex;align-items:center;justify-content:center;border:1.5px solid #c8a46a;border-radius:50%;background:rgba(253,246,236,.95);box-shadow:0 6px 18px rgba(68,42,18,.08)}
#radioStatus{position:absolute;top:126px;left:50%;transform:translateX(-50%);max-width:min(420px,calc(100vw - 40px));padding:6px 12px;border-radius:999px;background:rgba(253,246,236,.88);color:#6a4a2a;font:11px Georgia,serif;text-align:center;pointer-events:none;opacity:0;transition:opacity .2s;z-index:10}
#radioStatus.show{opacity:1}
#nighttoggle{position:absolute;top:16px;right:16px;display:none;background:#fdf6ec;color:#5c3a1e;border:1.5px solid #c8a46a;border-radius:10px;padding:6px 12px;font:11px Georgia,serif;cursor:pointer;transition:background .2s;pointer-events:all;z-index:10}
#nighttoggle.show{display:block}
#nighttoggle:hover{background:#ecd9a4}
#exitbtn{position:absolute;left:50%;bottom:28px;transform:translateX(-50%);display:none;align-items:center;justify-content:center;min-width:140px;height:44px;padding:0 24px;border:2px solid #5c3a1e;background:#d48854;color:#fff6e6;font:700 13px Georgia,serif;border-radius:12px;cursor:pointer;pointer-events:all;z-index:10}
#exitbtn.show{display:flex}
#exitbtn:hover{background:#c97744}
#tooltip{position:absolute;pointer-events:none;background:#fdf6ec;border:1.5px solid #c8a46a;border-radius:10px;padding:6px 12px;font:11px Georgia,serif;color:#5c3a1e;opacity:0;transition:opacity .2s;white-space:nowrap;z-index:20}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:none;background:#fdf6ec;border:2px solid #c8a46a;border-radius:12px;padding:20px 28px;color:#5c3a1e;font:14px Georgia,serif;text-align:center;z-index:100}
#loading.show{display:block}
#error{position:absolute;top:60px;left:16px;opacity:0;background:#f8d4d4;border:1.5px solid #d4784a;border-radius:8px;padding:8px 12px;color:#8b3a1e;font:11px Georgia,serif;transition:opacity .25s;pointer-events:none;z-index:20}
#error.show{opacity:1}

/* Modal */
#modal{position:absolute;inset:0;display:none;align-items:center;justify-content:center;pointer-events:all;z-index:50;background:rgba(60,30,10,.55)}
#modal.open{display:flex}
#mbox{width:min(600px,90vw);max-height:min(740px,90vh);overflow:hidden;background:#fdf6ec;border:3px solid #c8a46a;border-radius:20px;display:flex;flex-direction:column}
#mhead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:#e8c88a;border-bottom:2px solid #c8a46a;flex-shrink:0}
#mhead h2{font:15px Georgia,serif;color:#3a1e08;font-weight:400}
#closebtn{border:none;border-radius:10px;padding:5px 12px;background:#d4784a;color:#fdf6ec;font:11px Georgia,serif;cursor:pointer}
#mroom{position:relative;height:240px;overflow:hidden;flex-shrink:0}
#mroom canvas{width:100%;height:100%;display:block}
#forrestmsg{position:absolute;top:10px;left:50%;transform:translateX(-50%);opacity:0;background:rgba(253,246,236,.95);border:1.5px solid #c8a46a;border-radius:8px;padding:5px 14px;color:#5c3a1e;font:11px Georgia,serif;white-space:nowrap;transition:opacity .35s;pointer-events:none;z-index:5}
#repos{padding:12px 16px;overflow-y:auto;flex:1}
.rcard{background:#fff8f0;border:1.5px solid #e0c090;border-radius:10px;padding:10px 12px;margin-bottom:8px}
.rcard.clickable{cursor:pointer;transition:transform .16s,box-shadow .16s,border-color .16s}
.rcard.clickable:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(68,42,18,.08);border-color:#c8a46a}
.rname{font:13px Georgia,serif;color:#3a1e08;margin-bottom:3px}
.rdesc{font-size:11px;color:#8a6a4a;margin-bottom:6px;line-height:1.4}
.rmeta{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.rstat{font-size:11px;color:#6a4a2a}
.rlang{padding:3px 8px;border-radius:999px;border:1px solid rgba(24,47,69,.14);font-size:10px;font-weight:700;color:#173047;background:#edf4d8}
.rage{margin-left:auto;font-size:10px;color:#8b775f}
@media(max-width:640px){
  #welcomeBox{padding:28px 22px}
  #mhead h2{font-size:13px}
  #repos{max-height:180px}
}
</style>
</head>
<body>

<div id="welcome">
  <div id="welcomeBox">
    <h1>Repo Town</h1>
    <p>Explore your GitHub repos as a calm pastel village.</p>
    <div class="welcomeForm">
      <input type="text" id="welcomeUsername" placeholder="GitHub username…"/>
      <button id="welcomeGo">Explore Town</button>
      <button id="githubLogin">Continue with GitHub</button>
      <div id="authhint">Username mode loads public repositories only. Click any house to explore its repos.</div>
    </div>
  </div>
</div>

<div id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <div id="userbadge"></div>
    <div id="radioDock">
      <button id="radioBtn">Play Radio</button>
      <div id="radioIcon" aria-hidden="true">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
          <rect x="3" y="6" width="16" height="11" rx="3" fill="#eed8b8" stroke="#8d6b48" stroke-width="1.2"/>
          <path d="M7 6L15 3.5" stroke="#8d6b48" stroke-width="1.2" stroke-linecap="round"/>
          <circle cx="8" cy="11.5" r="1.8" fill="#c97a4b" stroke="#8d6b48" stroke-width="1"/>
          <path d="M12 10.5H16M12 12.8H15.4" stroke="#8d6b48" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div id="radioStatus"></div>
    <button id="nighttoggle">Night</button>
    <div id="exitbtn">Exit Town</div>
    <div id="tooltip"></div>
    <div id="loading">Building Repo Town…</div>
    <div id="error"></div>
    <div id="modal">
      <div id="mbox">
        <div id="mhead">
          <h2 id="mlangtitle">Language</h2>
          <button id="closebtn">Back to village</button>
        </div>
        <div id="mroom"><canvas id="rc"></canvas>
          <div id="forrestmsg"></div>
        </div>
        <div id="repos"></div>
      </div>
    </div>
  </div>
</div>
<audio id="radioAudio" preload="none"></audio>

<script>
// ─── canvas setup ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = window.innerWidth, H = window.innerHeight;
function resizeCanvas(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W; canvas.height = H;
  forrestX = Math.min(Math.max(forrestX, 60), W - 60);
}

// ─── state ────────────────────────────────────────────────────────────────────
let t = 0, hovH = null;
let forrestX = 120, forrestDir = 1;
let roomAnim = null, bookFallY = 0, bookFalling = false, bookVY = 0, roomT = 0;
let currentUsername = '', isNight = false;
let currentRepos = [], currentProfile = null, currentStation = null;
const HOUSES = [];

// ─── colour palettes (day / night) ───────────────────────────────────────────
const DAY = {
  sky:['#c8e8f8','#dff2fb','#f5f0e4'],
  ground:['#7ec86a','#6ab558','#559048'],
  hill:['#8ed07e','#a8dca0'],
  road:'#d9c3a3', roadDark:'#bfa080',
  sun:'#f7e0a0',
  clouds:'rgba(255,255,255,0.82)',
  label:'#3a2010', chip:'rgba(253,246,236,0.96)', chipBorder:'rgba(92,58,30,0.18)',
  repoChip:'#4a3010',
};
const NIGHT = {
  sky:['#0e1928','#1a2a3e','#283648'],
  ground:['#3a5a3e','#2d4830','#1e3322'],
  hill:['#406044','#527a56'],
  road:'#5a6878', roadDark:'#48566a',
  sun:'#d0dce8',
  clouds:'rgba(50,70,95,0.75)',
  label:'#f0e8d8', chip:'rgba(20,32,48,0.92)', chipBorder:'rgba(200,220,240,0.2)',
  repoChip:'#d0c8b8',
};
function C(){ return isNight ? NIGHT : DAY; }

// ─── language wall colours ────────────────────────────────────────────────────
const LANG_WALL = {
  Python:'#f0c9a7', JavaScript:'#f5e0a8', TypeScript:'#ccd7f0', Rust:'#e5b3a4',
  Java:'#f1c6a2', Go:'#b9dde6', 'C++':'#e7b8cb', C:'#d7d4d9', 'C#':'#c9ddb5',
  PHP:'#c8cae5', Ruby:'#e3b0ba', Swift:'#f5c5b0', Kotlin:'#d9c3f0',
  Shell:'#d6eab8', HTML:'#f3c1af', CSS:'#d7c5eb', SCSS:'#e6c0d4',
  Lua:'#c6cce6', Dart:'#b8e1de', Other:'#e0d8cc'
};
const LANG_BADGE_BG = {
  Python:'#f4e1ca', JavaScript:'#f5ecbf', TypeScript:'#dfe8fb', Rust:'#f0d4cd',
  Go:'#d7eef4', Ruby:'#f3d1d7', CSS:'#e7ddf8', HTML:'#f6d5c8'
};

const FORREST_MSGS = [
  'Cherry just knocked a book off the shelf!',
  'Toto says hi from across the room…',
  'Forrest is staring intently at the wall again.',
  'Mango and Peach are snuggled up together.',
  'Oh wait — when did Forrest sneak in here?',
  'Toto is napping on top of the bookshelf.',
];

// ─── helpers ─────────────────────────────────────────────────────────────────
function formatAgo(d){
  const s = Math.floor((Date.now()-new Date(d))/1000);
  if(s<60) return 'just now';
  const m=Math.floor(s/60); if(m<60) return m+'m ago';
  const h=Math.floor(m/60); if(h<24) return h+'h ago';
  const dy=Math.floor(h/24); if(dy<30) return dy+'d ago';
  const mo=Math.floor(dy/30); if(mo<12) return mo+'mo ago';
  return 'long ago';
}
function recencyState(updatedAt){
  const days=(Date.now()-new Date(updatedAt))/(864e5);
  if(days>=540) return 'haunted';
  if(days>=180) return 'forgotten';
  if(days>=90)  return 'quiet';
  return 'active';
}
function showLoading(v){ document.getElementById('loading').classList.toggle('show',v); }
function showError(msg){
  const el=document.getElementById('error');
  el.textContent=msg||''; el.classList.toggle('show',!!msg);
  if(msg) window.setTimeout(()=>el.classList.remove('show'),5000);
}
function setRadioStatus(msg,on=true){
  const el=document.getElementById('radioStatus');
  el.textContent=msg; el.classList.toggle('show',on&&!!msg);
}
function distKm(la1,lo1,la2,lo2){
  const R=6371,r=v=>v*Math.PI/180,dLa=r(la2-la1),dLo=r(lo2-lo1);
  const a=Math.sin(dLa/2)**2+Math.cos(r(la1))*Math.cos(r(la2))*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// ─── github ───────────────────────────────────────────────────────────────────
async function fetchRepos(username){
  const headers={'Accept':'application/vnd.github.v3+json'};
  try{
    showLoading(true); showError('');
    let all=[], page=1, more=true;
    const profP=fetch(`https://api.github.com/users/${username}`,{headers}).then(r=>r.ok?r.json():null);
    while(more&&page<=5){
      const r=await fetch(`https://api.github.com/users/${username}/repos?page=${page}&per_page=100&sort=updated`,{headers});
      if(!r.ok){ if(r.status===404) throw new Error(`User "${username}" not found`); throw new Error('GitHub API error '+r.status); }
      const data=await r.json();
      if(!data.length) more=false;
      all=all.concat(data); page++;
    }
    const repos=all.filter(r=>!r.private).sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
    if(!repos.length) throw new Error('No public repos found for '+username);
    currentRepos=repos;
    const profile=await profP;
    currentProfile=profile;
    buildHouses(repos);
    signIn(username,profile);
    showLoading(false);
  }catch(e){ HOUSES.length=0; showLoading(false); showError(e.message); }
}

function buildHouses(repos){
  const groups={};
  repos.forEach(r=>{
    const L=r.language||'Other';
    if(!groups[L]) groups[L]={repos:[],stars:0,forks:0};
    groups[L].repos.push(r);
    groups[L].stars+=r.stargazers_count||0;
    groups[L].forks+=r.forks_count||0;
  });
  const langs=Object.keys(groups).sort((a,b)=>groups[b].repos.length-groups[a].repos.length).slice(0,6);
  HOUSES.length=0;
  langs.forEach((lang,i)=>{
    const g=groups[lang];
    g.repos.sort((a,b)=>new Date(b.updated_at)-new Date(a.updated_at));
    const quality=Math.min(1,(g.stars+g.forks*0.5)/150);
    const state=recencyState(g.repos[0]?.updated_at);
    HOUSES.push({
      x:((i+1)/(langs.length+1))*W,
      label:lang, repos:g.repos.length, state, quality,
      wall:LANG_WALL[lang]||`hsl(${i*58},48%,82%)`,
      langRepos:g.repos, stars:g.stars, forks:g.forks,
    });
  });
  hovH=null; t=0;
}

function signIn(username,profile){
  currentUsername=username;
  document.getElementById('welcome').classList.add('hidden');
  const badge=document.getElementById('userbadge');
  const av=profile?.avatar_url?`<img class="avatar" src="${profile.avatar_url}" referrerpolicy="no-referrer"/>`:'';
  badge.innerHTML=`${av}<span>@${username}</span>`;
  badge.classList.add('show');
  document.getElementById('nighttoggle').classList.add('show');
  document.getElementById('exitbtn').classList.add('show');
}
function resetToWelcome(){
  document.getElementById('welcome').classList.remove('hidden');
  document.getElementById('userbadge').classList.remove('show');
  document.getElementById('nighttoggle').classList.remove('show');
  document.getElementById('exitbtn').classList.remove('show');
  document.getElementById('modal').classList.remove('open');
  setRadioStatus('',false); showError(''); hovH=null;
}

// ─── radio ────────────────────────────────────────────────────────────────────
async function toggleRadio(){
  const btn=document.getElementById('radioBtn');
  const audio=document.getElementById('radioAudio');
  if(currentStation&&!audio.paused){ audio.pause(); btn.textContent='Play Radio'; setRadioStatus('Radio paused.'); return; }
  if(currentStation&&audio.src){ try{ await audio.play(); btn.textContent='Pause Radio'; setRadioStatus('Playing '+currentStation.name); }catch(e){ setRadioStatus('Playback blocked — try again.'); } return; }
  if(!navigator.geolocation){ setRadioStatus('Location not available.'); return; }
  btn.disabled=true; btn.textContent='Finding…'; setRadioStatus('Looking for a nearby station…');
  navigator.geolocation.getCurrentPosition(async pos=>{
    try{
      const {latitude:la,longitude:lo}=pos.coords;
      const r=await fetch('https://de1.api.radio-browser.info/json/stations/search?has_geo_info=true&hidebroken=true&is_https=true&order=clickcount&reverse=true&limit=200');
      if(!r.ok) throw new Error('Radio service unavailable');
      const stations=await r.json();
      const nearby=stations
        .filter(s=>s.url_resolved&&isFinite(+s.geo_lat)&&isFinite(+s.geo_long))
        .map(s=>({...s,dist:distKm(la,lo,+s.geo_lat,+s.geo_long)}))
        .sort((a,b)=>a.dist-b.dist);
      if(!nearby[0]) throw new Error('No nearby station found');
      currentStation=nearby[0];
      audio.src=currentStation.url_resolved; audio.load();
      await audio.play();
      btn.textContent='Pause Radio';
      setRadioStatus('Playing '+currentStation.name+(currentStation.state?' • '+currentStation.state:''));
    }catch(e){ currentStation=null; setRadioStatus(e.message||'Could not start radio.'); btn.textContent='Play Radio'; }
    finally{ btn.disabled=false; }
  },err=>{
    btn.disabled=false; btn.textContent='Play Radio';
    setRadioStatus(err.code===1?'Location permission denied.':'Could not get location.');
  },{timeout:10000,maximumAge:3e5});
}

// ═══════════════════════════════════════════════════════════════════════════════
//  DRAWING — storybook illustrated style
// ═══════════════════════════════════════════════════════════════════════════════

// rounded polygon helper
function roundedPoly(pts, r){
  ctx.beginPath();
  for(let i=0;i<pts.length;i++){
    const a=pts[(i-1+pts.length)%pts.length], b=pts[i], c=pts[(i+1)%pts.length];
    const ab=Math.hypot(b[0]-a[0],b[1]-a[1]), bc=Math.hypot(c[0]-b[0],c[1]-b[1]);
    const t1=Math.min(r/ab,0.5), t2=Math.min(r/bc,0.5);
    const x1=b[0]+(a[0]-b[0])*t1, y1=b[1]+(a[1]-b[1])*t1;
    const x2=b[0]+(c[0]-b[0])*t2, y2=b[1]+(c[1]-b[1])*t2;
    if(i===0) ctx.moveTo(x1,y1); else ctx.lineTo(x1,y1);
    ctx.quadraticCurveTo(b[0],b[1],x2,y2);
  }
  ctx.closePath();
}

function drawSky(){
  const pal=C();
  const g=ctx.createLinearGradient(0,0,0,H*0.56);
  pal.sky.forEach((c,i)=>g.addColorStop(i/2,c));
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H*0.56);
}

function drawCelestial(){
  const x=W*0.84, y=Math.min(76,H*0.13);
  if(isNight){
    // moon
    ctx.fillStyle='#d8e8f0'; ctx.beginPath(); ctx.arc(x,y,26,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=C().sky[1]; ctx.beginPath(); ctx.arc(x+8,y-4,20,0,Math.PI*2); ctx.fill();
    // stars
    const stars=[[W*.1,H*.05],[W*.25,H*.08],[W*.4,H*.04],[W*.55,H*.07],[W*.65,H*.03],[W*.15,H*.13],[W*.72,H*.1],[W*.88,H*.06],[W*.33,H*.12]];
    stars.forEach(([sx,sy],i)=>{
      const a=0.5+Math.sin(t*1.4+i)*0.4;
      ctx.fillStyle=`rgba(255,255,230,${a})`; ctx.beginPath(); ctx.arc(sx,sy,1.2,0,Math.PI*2); ctx.fill();
    });
  } else {
    ctx.fillStyle='#f0e8b0'; ctx.beginPath(); ctx.arc(x,y,30,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#fdf8d8'; ctx.beginPath(); ctx.arc(x,y,22,0,Math.PI*2); ctx.fill();
    for(let i=0;i<8;i++){
      const a=i*Math.PI/4+t*0.15;
      ctx.strokeStyle='rgba(250,230,120,0.4)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.moveTo(x+Math.cos(a)*28,y+Math.sin(a)*28); ctx.lineTo(x+Math.cos(a)*42,y+Math.sin(a)*42); ctx.stroke();
    }
  }
}

function drawClouds(){
  const clr=C().clouds;
  [[W*.1,H*.1,0.9],[W*.28,H*.07,0.7],[W*.62,H*.09,0.8],[W*.8,H*.06,0.6]].forEach(([cx,cy,op],i)=>{
    const ox=Math.sin(t*0.22+i)*10;
    ctx.fillStyle=clr.replace(')',`,${op})`).replace('rgba','rgba');
    // just use direct fillStyle
    ctx.fillStyle=isNight?`rgba(50,70,95,${op})`:`rgba(255,255,255,${op})`;
    [[0,0,24],[20,-9,18],[42,0,20],[58,0,15]].forEach(([dx,dy,r])=>{
      ctx.beginPath(); ctx.arc(cx+dx+ox,cy+dy,r,0,Math.PI*2); ctx.fill();
    });
  });
}

function drawGround(){
  const pal=C();
  const g=ctx.createLinearGradient(0,H*0.56,0,H);
  g.addColorStop(0,pal.ground[0]); g.addColorStop(0.2,pal.ground[1]); g.addColorStop(1,pal.ground[2]);
  ctx.fillStyle=g; ctx.fillRect(0,H*0.56,W,H*0.44);
  // rolling hill
  ctx.fillStyle=pal.hill[0];
  ctx.beginPath();
  for(let i=0;i<=32;i++){
    const x=(i/32)*W, y=H*0.66-Math.sin((i/32)*Math.PI)*Math.min(60,H*0.12)-Math.sin(t*0.28+i*0.22)*5;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.lineTo(W,H); ctx.lineTo(0,H); ctx.closePath(); ctx.fill();
  ctx.strokeStyle=pal.hill[1]; ctx.lineWidth=2.5;
  ctx.beginPath();
  for(let i=0;i<=32;i++){
    const x=(i/32)*W, y=H*0.66-Math.sin((i/32)*Math.PI)*Math.min(60,H*0.12)-Math.sin(t*0.28+i*0.22)*5;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.stroke();
}

function drawRoads(){
  const pal=C();
  const by=H*0.8;
  HOUSES.forEach(h=>{
    ctx.strokeStyle=pal.roadDark; ctx.lineWidth=5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(W*0.5,by+10); ctx.lineTo(h.x,by+14); ctx.stroke();
  });
  ctx.strokeStyle=pal.road; ctx.lineWidth=9;
  ctx.beginPath(); ctx.moveTo(W*0.5,H); ctx.lineTo(W*0.5,by); ctx.stroke();
}

// ─── trees ────────────────────────────────────────────────────────────────────
function drawAshoka(ax,ay,h2,leafCol){
  const lc=leafCol||(isNight?'#2a5a2e':'#3aaa3a');
  ctx.fillStyle=isNight?'#4a3520':'#7a5a3a';
  ctx.fillRect(ax-2,ay-h2,4,h2);
  ctx.fillStyle=lc;
  ctx.beginPath(); ctx.ellipse(ax,ay-h2*0.55,7,h2*0.52,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isNight?'#1a4020':'#2a8a2a';
  ctx.beginPath(); ctx.ellipse(ax,ay-h2*0.7,4,h2*0.35,0,0,Math.PI*2); ctx.fill();
}

function drawBanyan(bx,by){
  const tc=isNight?'#3a2a14':'#7a5a3a';
  const lc=isNight?'#244a28':'#4a9a2a';
  const lc2=isNight?'#1a3a1e':'#3a7a1a';
  ctx.fillStyle=tc; ctx.fillRect(bx-4,by-52,8,52);
  // canopy
  [[0,-52,30,18],[20,-42,18,13],[-20,-42,18,13],[8,-58,20,14],[-8,-58,20,14]].forEach(([dx,dy,rw,rh])=>{
    ctx.fillStyle=lc; ctx.beginPath(); ctx.ellipse(bx+dx,by+dy,rw,rh,0,0,Math.PI*2); ctx.fill();
  });
  ctx.fillStyle=lc2; ctx.beginPath(); ctx.ellipse(bx,by-52,24,14,0,0,Math.PI*2); ctx.fill();
  // aerial roots
  [[-20,-28],[-26,-18],[-22,-10],[20,-28],[26,-18],[22,-10]].forEach(([dx,dy])=>{
    ctx.strokeStyle=tc; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(bx+dx,by+dy); ctx.lineTo(bx+dx,by); ctx.stroke();
  });
}

function drawLake(cx,cy){
  ctx.fillStyle=isNight?'#1a3a5a':'#7ab8d8';
  ctx.beginPath(); ctx.ellipse(cx,cy,52,16,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=isNight?'rgba(100,160,220,0.2)':'rgba(255,255,255,0.3)';
  ctx.beginPath(); ctx.ellipse(cx-10,cy-4,18,5,Math.PI*0.1,0,Math.PI*2); ctx.fill();
}

// ─── storybook house ──────────────────────────────────────────────────────────
function drawHouse(h, hovered){
  const by  = H * 0.8;
  const oy  = hovered ? -8 : 0;
  const s   = 1 + Math.min(h.repos, 20) * 0.018;  // size scales with repo count
  const bw  = Math.max(52, Math.min(W * 0.14, 46 + h.repos * 2)) * s;
  const bh  = Math.max(56, Math.min(H * 0.22, 50 + h.repos * 3)) * s;
  const rh  = bh * 0.48;
  const x   = h.x;
  const top = by - bh + oy;
  const wc  = h.wall;

  // ── trees & lake behind house ──
  const treeCount = Math.min(Math.ceil(h.repos / 5), 5);
  if(h.quality > 0.65 && treeCount >= 2){
    drawLake(x - bw * 0.85, by - 12);
    drawBanyan(x - bw * 0.82, by);
  } else {
    for(let i=0;i<treeCount;i++){
      drawAshoka(x - bw*0.6 - i*14, by, 40 + i*8);
    }
  }

  // ── shadow ──
  ctx.fillStyle='rgba(0,0,0,0.06)';
  ctx.beginPath(); ctx.ellipse(x, by+4, bw*0.55, 7, 0, 0, Math.PI*2); ctx.fill();

  // ── body ──
  ctx.fillStyle=wc;
  ctx.beginPath(); ctx.roundRect(x-bw/2, top, bw, bh, 6); ctx.fill();

  // side shadow stripe
  ctx.fillStyle='rgba(0,0,0,0.07)';
  ctx.beginPath(); ctx.roundRect(x+bw*0.28, top, bw*0.1, bh, [0,6,6,0]); ctx.fill();

  // body outline
  ctx.strokeStyle='rgba(0,0,0,0.1)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(x-bw/2, top, bw, bh, 6); ctx.stroke();

  // ── roof ──
  const roofTip = [[x, top - rh]];
  const roofLeft = [x - bw/2 - 5, top];
  const roofRight = [x + bw/2 + 5, top];
  const midLeft = [x - bw/2 + 4, top];
  const midRight = [x + bw/2 - 4, top];

  // main roof face
  const roofHue = isNight ? shadeHex(wc,-40) : darkenHex(wc,30);
  ctx.fillStyle=roofHue;
  roundedPoly([[roofLeft[0],roofLeft[1]], roofTip[0], [roofRight[0],roofRight[1]]], 4);
  ctx.fill(); ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.stroke();

  // roof side shadow
  ctx.fillStyle='rgba(0,0,0,0.1)';
  roundedPoly([roofTip[0], [roofRight[0],roofRight[1]], [midRight[0],midRight[1]]], 3);
  ctx.fill();

  // ── chimney ──
  if(h.state==='active'){
    const chx=x+bw*0.22;
    const chy=top-rh*0.45;
    ctx.fillStyle=darkenHex(wc,40);
    ctx.fillRect(chx-4,chy-14,8,16);
    ctx.fillStyle='rgba(220,220,230,0.45)';
    for(let i=0;i<3;i++){
      const sy=chy-16-i*9+Math.sin(t*2+i)*3;
      ctx.beginPath(); ctx.arc(chx+Math.sin(t+i)*3,sy,3+i,0,Math.PI*2); ctx.fill();
    }
  }

  // ── windows ──
  const winState = h.state;
  const numWins  = bh > 90 ? 4 : 2;
  const wrows    = numWins > 2 ? 2 : 1;
  const wcols    = 2;
  const wSize    = Math.max(9, Math.min(13, bw*0.18));
  for(let row=0;row<wrows;row++){
    for(let col=0;col<wcols;col++){
      const wx = x + (col===0 ? -bw*0.22 : bw*0.22);
      const wy = top + bh*(row===0 ? 0.22 : 0.52);
      let wFill;
      if(winState==='active')       wFill=isNight?'#ffe090':'#fff3b0';
      else if(winState==='quiet')   wFill=isNight?'#b0c0d0':'#e0d4c0';
      else if(winState==='forgotten') wFill=isNight?'#606878':'#b8b4ae';
      else                          wFill=isNight?'#2a2a38':'#888898'; // haunted
      ctx.fillStyle=wFill;
      ctx.beginPath(); ctx.roundRect(wx-wSize/2,wy-wSize/2,wSize,wSize,2); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.12)'; ctx.lineWidth=0.8; ctx.stroke();
      // warm glow under lit window
      if(winState==='active'){
        ctx.fillStyle='rgba(255,200,80,0.12)';
        ctx.beginPath(); ctx.ellipse(wx,wy+wSize*1.2,wSize*1.4,wSize*0.5,0,0,Math.PI*2); ctx.fill();
      }
    }
  }

  // ── door ──
  ctx.fillStyle=darkenHex(wc,45);
  ctx.beginPath(); ctx.roundRect(x-6,by-22+oy,12,22,[3,3,0,0]); ctx.fill();
  ctx.fillStyle=isNight?'#f0d890':'#fff5a0';
  ctx.beginPath(); ctx.arc(x+3,by-11+oy,2,0,Math.PI*2); ctx.fill();

  // ── haunted ghost (Toto) ──
  if(winState==='haunted'||winState==='forgotten'){
    const gt=t*1.8;
    const gx=x+Math.sin(gt)*bw*0.22;
    const gy=top-18+Math.sin(gt*0.7)*8+oy;
    drawToto(gx,gy,10, winState==='haunted'?0.7:0.4);
  }

  // ── birds on thriving / active houses ──
  if(winState==='active'){
    const birdTypes=['M','P','C'];
    const birdCount=Math.min(h.repos>15?2:1,2);
    for(let i=0;i<birdCount;i++){
      const bx2=x+(i-birdCount/2+0.5)*14;
      const by2=top-rh-6+Math.sin(t*2+i)*2+oy;
      drawBird(birdTypes[i%3],bx2,by2,9);
    }
  }

  // ── label + chip ──
  const pal=C();
  ctx.textAlign='center';
  ctx.font='11px Georgia,serif';
  ctx.fillStyle=pal.label;
  ctx.fillText(h.label, x, by+15);
  if(h.repos>0){
    const txt=h.repos+' repos';
    ctx.font='10px Georgia,serif';
    const tw=ctx.measureText(txt).width;
    const cw=tw+18, ch=16, cx2=x, cy2=by+26;
    ctx.fillStyle=pal.chip;
    ctx.beginPath(); ctx.roundRect(cx2-cw/2,cy2-ch/2,cw,ch,8); ctx.fill();
    ctx.strokeStyle=pal.chipBorder; ctx.lineWidth=1; ctx.stroke();
    ctx.fillStyle=pal.repoChip; ctx.fillText(txt,cx2,cy2+4);
  }
}

// ─── Toto (ghost) ─────────────────────────────────────────────────────────────
function drawToto(x,y,sz,opacity){
  ctx.save(); ctx.globalAlpha=opacity;
  ctx.fillStyle=isNight?'rgba(200,200,240,0.8)':'rgba(180,180,220,0.7)';
  ctx.beginPath(); ctx.arc(x,y,sz,Math.PI,0); ctx.fill();
  ctx.beginPath(); ctx.arc(x-sz*0.55,y+sz*0.8,sz*0.55,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(x+sz*0.55,y+sz*0.8,sz*0.55,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(x-sz,y);
  for(let i=0;i<5;i++) ctx.lineTo(x-sz+i*sz*0.45+(i%2)*sz*0.18, y+sz+(i%2)*sz*0.4);
  ctx.closePath(); ctx.fill();
  ctx.globalAlpha=opacity*0.9;
  ctx.fillStyle='#3a3a6a';
  ctx.beginPath(); ctx.ellipse(x-sz*0.3,y-sz*0.05,sz*0.22,sz*0.28,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x+sz*0.3,y-sz*0.05,sz*0.22,sz*0.28,0,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

// ─── Mango (M), Peach (P), Cherry (C) ────────────────────────────────────────
function drawBird(type,bx,by,sz){
  ctx.save();
  if(type==='M'){
    ctx.fillStyle='#f5d060'; ctx.beginPath(); ctx.ellipse(bx,by,sz*.55,sz*.4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e8a020'; ctx.beginPath(); ctx.ellipse(bx,by-sz*.25,sz*.35,sz*.3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f08020'; ctx.beginPath(); ctx.moveTo(bx+sz*.35,by-sz*.2); ctx.lineTo(bx+sz*.6,by-sz*.18); ctx.lineTo(bx+sz*.35,by-sz*.1); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#3a8a3a'; ctx.beginPath(); ctx.ellipse(bx-sz*.1,by+sz*.1,sz*.5,sz*.18,Math.PI*.15,0,Math.PI*2); ctx.fill();
  } else if(type==='P'){
    ctx.fillStyle='#f8c0c0'; ctx.beginPath(); ctx.ellipse(bx,by,sz*.55,sz*.4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f0a0a0'; ctx.beginPath(); ctx.ellipse(bx,by-sz*.25,sz*.35,sz*.3,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#d07080'; ctx.beginPath(); ctx.moveTo(bx+sz*.35,by-sz*.2); ctx.lineTo(bx+sz*.6,by-sz*.18); ctx.lineTo(bx+sz*.35,by-sz*.1); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#3a8a3a'; ctx.beginPath(); ctx.ellipse(bx-sz*.1,by+sz*.1,sz*.5,sz*.18,Math.PI*.15,0,Math.PI*2); ctx.fill();
  } else {
    ctx.fillStyle='#e03030'; ctx.beginPath(); ctx.ellipse(bx,by,sz*.55,sz*.4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f05030'; ctx.beginPath(); ctx.ellipse(bx,by-sz*.25,sz*.38,sz*.32,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e06020'; ctx.beginPath(); ctx.moveTo(bx+sz*.38,by-sz*.2); ctx.lineTo(bx+sz*.62,by-sz*.18); ctx.lineTo(bx+sz*.38,by-sz*.1); ctx.closePath(); ctx.fill();
    ctx.fillStyle='#3a8a3a'; ctx.beginPath(); ctx.ellipse(bx-sz*.1,by+sz*.1,sz*.5,sz*.18,Math.PI*.15,0,Math.PI*2); ctx.fill();
    // Cherry's yellow crown
    ctx.fillStyle='#f0e040'; ctx.beginPath(); ctx.ellipse(bx,by-sz*.32,sz*.2,sz*.12,0,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// ─── ambient sky birds ────────────────────────────────────────────────────────
function drawAmbientBirds(){
  const flock=[
    {type:'M',bx:W*.15,by:H*.19,sz:8,sp:.5,wb:5,ph:0.3},
    {type:'P',bx:W*.28,by:H*.15,sz:7,sp:.4,wb:4,ph:1.1},
    {type:'C',bx:W*.5,by:H*.17,sz:8,sp:.48,wb:6,ph:2.0},
    {type:'M',bx:W*.68,by:H*.14,sz:7,sp:.44,wb:4,ph:2.6},
    {type:'P',bx:W*.82,by:H*.21,sz:8,sp:.35,wb:5,ph:3.2},
  ];
  flock.forEach(b=>{
    const dx=Math.sin(t*b.sp+b.ph)*16;
    const dy=Math.cos(t*b.sp*1.3+b.ph)*b.wb;
    drawBird(b.type,b.bx+dx,b.by+dy,b.sz);
  });
}

// ─── Forrest (conure) ─────────────────────────────────────────────────────────
function drawForrest(fx,fy){
  const wing=Math.sin(t*9)*.45;
  ctx.save(); ctx.translate(fx,fy);
  if(forrestDir<0) ctx.scale(-1,1);
  ctx.fillStyle='#2a7a2a';
  ctx.save(); ctx.rotate(-wing); ctx.beginPath(); ctx.ellipse(-3,0,10,4,Math.PI*.3,0,Math.PI*2); ctx.fill(); ctx.restore();
  ctx.save(); ctx.rotate(wing);  ctx.beginPath(); ctx.ellipse(3,1,8,3,Math.PI*.1,0,Math.PI*2);  ctx.fill(); ctx.restore();
  ctx.fillStyle='#e03030'; ctx.beginPath(); ctx.ellipse(0,0,9,6,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f06030'; ctx.beginPath(); ctx.ellipse(0,-5,6,5,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f06030'; ctx.beginPath(); ctx.ellipse(0,1,6,4,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f0a020'; ctx.beginPath(); ctx.moveTo(6,-4); ctx.lineTo(11,-3); ctx.lineTo(6,-1); ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawFlowers(){
  [[W*.08,H*.84],[W*.92,H*.86],[W*.62,H*.83],[W*.4,H*.82]].forEach(([fx,fy],i)=>{
    const fc=['#f87070','#f0c840','#d070c8','#70c8f0'][i];
    ctx.fillStyle=isNight?'#3a6a3a':'#5a9a3a'; ctx.fillRect(fx-1,fy-10,2,12);
    ctx.fillStyle=fc; ctx.beginPath(); ctx.arc(fx,fy-14,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#f8f8a0'; ctx.beginPath(); ctx.arc(fx,fy-14,2,0,Math.PI*2); ctx.fill();
  });
}

// ─── main render loop ─────────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);
  drawSky(); drawCelestial(); drawClouds(); drawGround();
  drawRoads(); drawAmbientBirds();
  HOUSES.forEach((h,i)=>drawHouse(h,hovH===i));
  drawFlowers();
  forrestX += 0.65*forrestDir;
  if(forrestX>W-50) forrestDir=-1;
  if(forrestX<50)   forrestDir=1;
  drawForrest(forrestX, H*0.62+Math.sin(t*3)*7);
  t+=0.018;
  requestAnimationFrame(render);
}

// ═══════════════════════════════════════════════════════════════════════════════
//  INDOOR ROOM — state-aware storybook interior
// ═══════════════════════════════════════════════════════════════════════════════
function openModal(house){
  document.getElementById('modal').classList.add('open');
  document.getElementById('mlangtitle').textContent=house.label+(house.repos?` – ${house.repos} repos`:'');
  // rebuild repo list
  const list=document.getElementById('repos');
  list.innerHTML='';
  (house.langRepos||[]).forEach(repo=>{
    const c=document.createElement('div'); c.className='rcard clickable';
    const bg=LANG_BADGE_BG[repo.language||'Other']||'#eef3df';
    c.innerHTML=`<div class="rname">${repo.name}</div>
      <div class="rdesc">${repo.description||'(no description)'}</div>
      <div class="rmeta">
        <span class="rstat">★ ${repo.stargazers_count||0}</span>
        <span class="rstat">⑂ ${repo.forks_count||0}</span>
        <span class="rlang" style="background:${bg}">${repo.language||'Other'}</span>
        <span class="rage">${formatAgo(repo.updated_at)}</span>
      </div>`;
    c.onclick=()=>{ if(repo.html_url) window.open(repo.html_url,'_blank','noopener'); };
    list.appendChild(c);
  });
  bookFalling=false; bookFallY=0; bookVY=0; roomT=0;
  window.setTimeout(()=>{
    bookFalling=true; bookVY=0;
    const msg=document.getElementById('forrestmsg');
    msg.textContent=FORREST_MSGS[Math.floor(Math.random()*FORREST_MSGS.length)];
    msg.style.opacity='1';
    window.setTimeout(()=>msg.style.opacity='0',2600);
  },900);
  cancelAnimationFrame(roomAnim);
  drawRoom(house);
}

function drawRoom(h){
  const rc=document.getElementById('rc');
  const rctx=rc.getContext('2d');
  rc.width=rc.offsetWidth||580; rc.height=240;
  const rw=rc.width, rh=rc.height;
  const state=h.state;
  const haunted=state==='haunted'||state==='forgotten';

  function frame(){
    roomT+=0.02;
    rctx.clearRect(0,0,rw,rh);

    // ── walls & floor ──
    const wallTop=haunted?'#22202a':h.wall+'cc';
    const wallBot=haunted?'#18181f':h.wall+'88';
    const wg=rctx.createLinearGradient(0,0,0,rh*.82);
    wg.addColorStop(0,wallTop); wg.addColorStop(1,wallBot);
    rctx.fillStyle=wg; rctx.fillRect(0,0,rw,rh*.82);

    // floorboards
    rctx.fillStyle=haunted?'#1a100a':'#3a2010';
    rctx.fillRect(0,rh*.82,rw,rh*.18);
    for(let i=0;i<8;i++){
      rctx.strokeStyle=haunted?'rgba(0,0,0,0.3)':'rgba(0,0,0,0.12)';
      rctx.lineWidth=0.8;
      rctx.beginPath(); rctx.moveTo(i*(rw/7),rh*.82); rctx.lineTo(i*(rw/7)+40,rh); rctx.stroke();
    }

    // skirting board
    rctx.fillStyle=haunted?'#101018':'#2a1808';
    rctx.fillRect(0,rh*.79,rw,4);

    // ── cobwebs for haunted ──
    if(haunted){
      [[rw*.04,rh*.04],[rw*.95,rh*.04],[rw*.04,rh*.5]].forEach(([cx,cy])=>{
        for(let i=0;i<6;i++){
          const a=(i/6)*Math.PI*0.5;
          rctx.strokeStyle='rgba(200,200,220,0.25)';
          rctx.lineWidth=0.5;
          rctx.beginPath(); rctx.moveTo(cx,cy);
          rctx.lineTo(cx+Math.cos(a)*40,cy+Math.sin(a)*40); rctx.stroke();
        }
        for(let r=10;r<=38;r+=12){
          rctx.beginPath();
          rctx.arc(cx,cy,r,0,Math.PI*0.5);
          rctx.strokeStyle='rgba(200,200,220,0.2)'; rctx.lineWidth=0.5; rctx.stroke();
        }
      });
    }

    // ── window ──
    const wlc = state==='active' ? '#c8f0ff'
               : state==='quiet' ? '#b0c4d4'
               : '#4a4a5a';
    rctx.fillStyle=wlc;
    rctx.fillRect(rw*.06,rh*.1,rw*.15,rh*.36);
    rctx.strokeStyle=haunted?'#5a5a6a':'#6a4a2a'; rctx.lineWidth=2;
    rctx.strokeRect(rw*.06,rh*.1,rw*.15,rh*.36);
    rctx.lineWidth=1;
    rctx.beginPath(); rctx.moveTo(rw*.135,rh*.1); rctx.lineTo(rw*.135,rh*.46); rctx.stroke();
    rctx.beginPath(); rctx.moveTo(rw*.06,rh*.28); rctx.lineTo(rw*.21,rh*.28); rctx.stroke();
    if(state==='active'){
      const glow=rctx.createRadialGradient(rw*.135,rh*.82,0,rw*.135,rh*.82,rw*.24);
      glow.addColorStop(0,'rgba(255,210,100,.2)'); glow.addColorStop(1,'transparent');
      rctx.fillStyle=glow; rctx.fillRect(0,rh*.4,rw*.35,rh*.6);
    }

    // ── bookshelf ──
    const bsx=rw*.54, bsy=rh*.05, bsw=rw*.43, bsh=rh*.74;
    rctx.fillStyle=haunted?'#2a1808':'#5a3a18';
    rctx.fillRect(bsx,bsy,bsw,bsh);
    rctx.fillStyle=haunted?'#1a1008':'#3a2008';
    [0,rh*.25,rh*.5].forEach(dy=>rctx.fillRect(bsx,bsy+dy,bsw,5));
    rctx.fillRect(bsx,bsy+bsh-5,bsw,5);

    // shelf dust for haunted
    if(haunted){
      rctx.fillStyle='rgba(200,200,180,0.12)';
      [0,rh*.25,rh*.5].forEach(dy=>rctx.fillRect(bsx,bsy+dy,bsw,3));
    }

    const BC=['#c03020','#2a6a2a','#2a2a8a','#c08010','#6a1a6a','#108a8a','#c06010','#4a9a20'];
    [0,1,2].forEach((shelf,si)=>{
      const sy=bsy+(si*bsh/3)+10;
      let bx=bsx+4;
      const cnt = state==='haunted' ? 3 : state==='forgotten' ? 5 : state==='quiet' ? 7 : 9;
      for(let i=0;i<cnt;i++){
        const bw=12+((i*7)%9), bh=22+((i*5)%14);
        const skip=(si===0&&i===6&&bookFalling);
        if(!skip){
          rctx.fillStyle=haunted?'rgba(80,70,70,0.6)':BC[(i+si*4)%BC.length];
          rctx.fillRect(bx,sy-bh,bw,bh);
          rctx.fillStyle='rgba(255,255,255,.1)'; rctx.fillRect(bx,sy-bh,2,bh);
          rctx.fillStyle='rgba(0,0,0,.15)'; rctx.fillRect(bx+bw-1,sy-bh,1,bh);
        }
        bx+=bw+2; if(bx>bsx+bsw-10) break;
      }
    });

    // falling book
    if(bookFalling){
      bookVY+=1.4; bookFallY+=bookVY;
      const floor=rh*.79-26;
      if(bookFallY>floor){ bookFallY=floor; bookVY*=-.25; }
    }
    const fbx=bsx+4+6*14, fby=bsy+10-22+bookFallY;
    rctx.save(); rctx.translate(fbx+6,fby+11);
    rctx.rotate(bookFalling?Math.min(bookFallY*.04,1.1):0);
    rctx.fillStyle='#e07820'; rctx.fillRect(-6,-11,12,22);
    rctx.fillStyle='rgba(255,255,255,.12)'; rctx.fillRect(-6,-11,2,22);
    rctx.restore();

    // ── desk ──
    const deskx=rw*.22, desky=rh*.67, deskw=rw*.27, deskh=8;
    rctx.fillStyle=haunted?'#3a2a18':'#6a4a28';
    rctx.fillRect(deskx,desky,deskw,deskh);
    rctx.fillStyle=haunted?'#4a3a20':'#8a6a3a';
    rctx.fillRect(deskx,desky,deskw,3);
    rctx.fillStyle='#3a1e08';
    rctx.fillRect(deskx+6,desky+deskh,5,rh*.12);
    rctx.fillRect(deskx+deskw-11,desky+deskh,5,rh*.12);

    // ── monitor ──
    const scx=deskx+deskw*.1, scy=desky-rh*.22, scw=deskw*.8, sch=rh*.19;
    rctx.fillStyle='#1a1a2a'; rctx.fillRect(scx,scy,scw,sch);
    const pulse=.5+Math.sin(roomT*3)*.5;
    const sc1 = haunted ? `rgba(80,60,120,${0.06+pulse*.06})` : `rgba(100,180,255,${0.06+pulse*.08})`;
    rctx.fillStyle=sc1; rctx.fillRect(scx,scy,scw,sch);
    const sc2 = haunted ? '#7a5aaa' : '#3a6aca';
    rctx.strokeStyle=sc2; rctx.lineWidth=1.5; rctx.strokeRect(scx,scy,scw,sch);
    rctx.font=`bold ${rw*.021}px Georgia,serif`; rctx.textAlign='center';
    const tc=haunted?`rgba(180,140,255,${.7+pulse*.3})`:`rgba(120,200,255,${.7+pulse*.3})`;
    rctx.fillStyle=tc; rctx.fillText('view repos',scx+scw/2,scy+sch*.48);
    rctx.font=`${rw*.015}px Georgia,serif`;
    rctx.fillStyle=haunted?'rgba(150,110,200,.7)':'rgba(80,130,200,.8)';
    rctx.fillText(h.label,scx+scw/2,scy+sch*.72);
    rctx.fillStyle='#1a1808'; rctx.fillRect(scx-2,scy+sch,scw+4,4);
    rctx.fillStyle='#2a1808'; rctx.fillRect(scx+scw*.3,scy+sch,scw*.4,6);

    // ── Toto ghost for haunted rooms ──
    if(haunted){
      const gx=rw*.38+Math.sin(roomT)*28, gy=rh*.35+Math.sin(roomT*.7)*10;
      // draw inline ghost
      rctx.save(); rctx.globalAlpha=0.55;
      rctx.fillStyle='rgba(200,200,240,0.75)';
      rctx.beginPath(); rctx.arc(gx,gy,14,Math.PI,0); rctx.fill();
      rctx.beginPath(); rctx.arc(gx-7,gy+12,8,0,Math.PI*2); rctx.fill();
      rctx.beginPath(); rctx.arc(gx+7,gy+12,8,0,Math.PI*2); rctx.fill();
      rctx.beginPath(); rctx.moveTo(gx-14,gy);
      for(let i=0;i<5;i++) rctx.lineTo(gx-14+i*6.5+(i%2)*2.5,gy+20+(i%2)*5);
      rctx.closePath(); rctx.fill();
      rctx.fillStyle='#3a3a6a';
      rctx.beginPath(); rctx.ellipse(gx-4,gy-2,3,4,0,0,Math.PI*2); rctx.fill();
      rctx.beginPath(); rctx.ellipse(gx+4,gy-2,3,4,0,0,Math.PI*2); rctx.fill();
      rctx.restore();
      // "Toto…" whisper
      const alpha=0.3+Math.sin(roomT*2)*.25;
      rctx.font=`italic ${rw*.018}px Georgia,serif`; rctx.textAlign='center';
      rctx.fillStyle=`rgba(200,200,240,${alpha})`;
      rctx.fillText('Toto…',gx,gy-22);
    } else {
      // Forrest flying in non-haunted rooms
      const frx=rw*.32+Math.sin(roomT*1.5)*26, fry=rh*.44+Math.sin(roomT*2)*10;
      const wing2=Math.sin(roomT*9)*.5;
      rctx.save(); rctx.translate(frx,fry);
      rctx.fillStyle='#2a7a2a';
      rctx.save(); rctx.rotate(-wing2); rctx.beginPath(); rctx.ellipse(-4,0,12,5,Math.PI*.3,0,Math.PI*2); rctx.fill(); rctx.restore();
      rctx.save(); rctx.rotate(wing2);  rctx.beginPath(); rctx.ellipse(4,1,10,4,Math.PI*.1,0,Math.PI*2);  rctx.fill(); rctx.restore();
      rctx.fillStyle='#e03030'; rctx.beginPath(); rctx.ellipse(0,0,11,7,0,0,Math.PI*2); rctx.fill();
      rctx.fillStyle='#f06030'; rctx.beginPath(); rctx.ellipse(0,-6,7,6,0,0,Math.PI*2); rctx.fill();
      rctx.fillStyle='#f06030'; rctx.beginPath(); rctx.ellipse(0,1,6,4,0,0,Math.PI*2); rctx.fill();
      rctx.fillStyle='#f0a020'; rctx.beginPath(); rctx.moveTo(7,-5); rctx.lineTo(13,-4); rctx.lineTo(7,-2); rctx.closePath(); rctx.fill();
      rctx.restore();
    }

    // click on monitor → scroll to repo list
    rc.onclick=ev=>{
      const r2=rc.getBoundingClientRect();
      const mx=(ev.clientX-r2.left)*(rw/r2.width);
      const my=(ev.clientY-r2.top)*(rh/r2.height);
      if(mx>scx&&mx<scx+scw&&my>scy&&my<scy+sch)
        document.getElementById('repos').scrollIntoView({behavior:'smooth'});
    };

    roomAnim=requestAnimationFrame(frame);
  }
  frame();
}

// ─── colour helpers ───────────────────────────────────────────────────────────
function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}
function darkenHex(hex,amt){
  try{
    let [r,g,b]=hexToRgb(hex.length===4?hex.replace(/([0-9a-f])/gi,'$1$1'):hex);
    return `rgb(${Math.max(0,r-amt)},${Math.max(0,g-amt)},${Math.max(0,b-amt)})`;
  }catch(e){ return hex; }
}
function shadeHex(hex,amt){
  try{
    let [r,g,b]=hexToRgb(hex.length===4?hex.replace(/([0-9a-f])/gi,'$1$1'):hex);
    return `rgb(${Math.min(255,Math.max(0,r+amt))},${Math.min(255,Math.max(0,g+amt))},${Math.min(255,Math.max(0,b+amt))})`;
  }catch(e){ return hex; }
}

// ─── tooltip & click ─────────────────────────────────────────────────────────
const tip=document.getElementById('tooltip');
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width);
  const my=(e.clientY-rect.top)*(H/rect.height);
  const by=H*.8;
  let found=null;
  HOUSES.forEach((h,i)=>{
    const bw=Math.max(52,Math.min(W*.14,46+h.repos*2));
    const bh=Math.max(56,Math.min(H*.22,50+h.repos*3));
    if(mx>h.x-bw/2-8&&mx<h.x+bw/2+8&&my>by-bh-40&&my<by+8) found=i;
  });
  hovH=found;
  canvas.style.cursor=found!==null?'pointer':'default';
  if(found===null){ tip.style.opacity='0'; return; }
  const h=HOUSES[found];
  const sx=(h.x/W)*rect.width+rect.left;
  const sy=((H*.8-100)/H)*rect.height+rect.top;
  const stateLabel=h.state==='haunted'?'👻 ghost of repo past':h.state==='forgotten'?'cobwebs forming':h.state;
  tip.textContent=`${h.label} · ${h.repos} repos · ${stateLabel}`;
  tip.style.left=(sx-60)+'px'; tip.style.top=(sy-rect.top-34)+'px'; tip.style.opacity='1';
});
canvas.addEventListener('click',()=>{ if(hovH!==null) openModal(HOUSES[hovH]); });

// ─── controls ────────────────────────────────────────────────────────────────
document.getElementById('closebtn').onclick=()=>{
  document.getElementById('modal').classList.remove('open'); cancelAnimationFrame(roomAnim);
};
document.getElementById('welcomeGo').onclick=()=>{
  const u=document.getElementById('welcomeUsername').value.trim(); if(u) fetchRepos(u);
};
document.getElementById('welcomeUsername').addEventListener('keypress',e=>{
  if(e.key==='Enter'){ const u=document.getElementById('welcomeUsername').value.trim(); if(u) fetchRepos(u); }
});
document.getElementById('nighttoggle').onclick=()=>{
  isNight=!isNight; document.getElementById('nighttoggle').textContent=isNight?'Day':'Night';
};
document.getElementById('exitbtn').onclick=resetToWelcome;
document.getElementById('radioBtn').onclick=toggleRadio;
document.getElementById('radioAudio').addEventListener('pause',()=>{
  if(currentStation) document.getElementById('radioBtn').textContent='Play Radio';
});
window.addEventListener('resize',()=>{ resizeCanvas(); if(currentRepos.length) buildHouses(currentRepos); });

// ─── boot ─────────────────────────────────────────────────────────────────────
resizeCanvas();
render();
</script>
